name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Memastikan semua dependensi terinstal
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy

      - name: Run MLflow Project
        run: |
          # Menjalankan project dari folder root agar mudah ditemukan
          # Pastikan file MLproject berada di folder MLproject
          mlflow run MLproject --env-manager=local --experiment-name "Eksperimen_Hate_Speech_Ammar_Fernanda_Khoiri"
        
      - name: Get latest MLflow run_id
        run: |
          # Mengambil direktori run terbaru
          LATEST_RUN=$(ls -td mlruns/0/*/ | head -n 1)
          RUN_ID=$(basename "$LATEST_RUN")
          # Menyimpan ke environment variable tanpa spasi tambahan
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}
