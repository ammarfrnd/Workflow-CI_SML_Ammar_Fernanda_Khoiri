name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy

      # LANGKAH CRITICAL: Menjalankan folder, bukan file.
      # Pastikan folder 'MLproject' ada di root repository Anda.
      - name: Run MLflow Project
        run: |
          echo "Menjalankan proyek dari folder MLProject..."
          mlflow run MLproject --env-manager=local
        
      # Mengambil RUN_ID secara otomatis dari folder mlruns
      - name: Get latest MLflow run_id
        run: |
          LATEST_RUN=$(ls -td mlruns/0/*/ | head -n 1)
          RUN_ID=$(basename "$LATEST_RUN")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID yang ditemukan: $RUN_ID"
          
      # Build Docker menggunakan RUN_ID yang valid
      - name: Build Docker Model
        run: |
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
