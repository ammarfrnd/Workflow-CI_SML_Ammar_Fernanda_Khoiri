name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy

      # LANGKAH CRITICAL: Menjalankan folder, bukan file.
      # Pastikan folder 'MLproject' ada di root repository Anda.
      - name: Run MLflow Project
        run: |
          echo "Menjalankan proyek dari folder MLProject..."
          mlflow run MLproject --env-manager=local
        
      - name: Get latest MLflow run_id
        run: |
          # Cari direktori run terbaru di dalam mlruns/0/
          # Kita gunakan ls -td untuk mengurutkan berdasarkan waktu
          LATEST_RUN=$(ls -td mlruns/0/*/ | head -n 1)
          # Ambil nama foldernya saja (ini adalah RUN_ID)
          RUN_ID=$(basename "$LATEST_RUN")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID berhasil didapatkan: $RUN_ID"
          
      - name: Build Docker Model
        run: |
          # 1. Pastikan file run_id.txt ada
          if [ -f "run_id.txt" ]; then
            RUN_ID=$(cat run_id.txt)
            echo "RUN_ID yang dibaca adalah: $RUN_ID"
            
            # 2. Pastikan RUN_ID tidak kosong
            if [ -n "$RUN_ID" ]; then
              mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"
            else
              echo "Error: File run_id.txt kosong!"
              exit 1
            fi
          else
            echo "Error: File run_id.txt tidak ditemukan di root!"
            # Debugging: tampilkan isi folder saat ini
            ls -R
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
