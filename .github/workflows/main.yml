name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Memastikan semua dependensi terinstal
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy

      - name: Run MLflow Project
        run: |
          # Menjalankan project dari folder root agar mudah ditemukan
          # Pastikan file MLproject berada di folder MLproject
          mlflow run MLproject --env-manager=local --experiment-name "Eksperimen_Hate_Speech_Ammar_Fernanda_Khoiri"
        
      - name: Get latest MLflow run_id
        run: |
          # Mengambil direktori run terbaru
          LATEST_RUN=$(ls -td mlruns/0/*/ | head -n 1)
          RUN_ID=$(basename "$LATEST_RUN")
          # Menyimpan ke environment variable tanpa spasi tambahan
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          
      - name: Build Docker Model
        run: |
          # Ekstrak run_id dari log
          RUN_ID=$(grep -oP 'MLfLow_run_id:\K[a-zA-Z0-9]+' output.log | tail -n 1)
          
          if [ -z "run_id" ]; then
            echo "Error: run id tidak ditemukan di log!"
            exit 1
          fi
          
          echo "run id berhasil ditemukan: run_id"
          
          # Build Docker menggunakan id yang valid
          mlflow models build-docker --model-uri "runs:/run_id/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKER_HUB_USERNAME}}
          password: ${{secrets.DOCKER_HUB_ACCESS_TOKEN}}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{secrets.DOCKER_HUB_USERNAME}}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{secrets.DOCKER_HUB_USERNAME}}/smsml_ammar_fernanda_khoiri:latest
