name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow tensorflow scikit-learn

      - name: Run MLflow Project
        # Kita gunakan perintah langsung ke folder root atau folder spesifik.
        # Jika file 'MLproject' ada di root, gunakan '.', jika di dalam folder 'MLProject', gunakan './MLProject'
        run: |
          echo "Menjalankan MLflow project..."
          mlflow run . --env-manager=local
        
      - name: Get latest MLflow run_id
        run: |
          # Mencari direktori eksperimen terbaru
          # Menggunakan path yang benar untuk mengakses mlruns
          LATEST_RUN_DIR=$(ls -td mlruns/0/*/ | head -n 1)
          RUN_ID=$(basename "$LATEST_RUN_DIR")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Found RUN_ID: $RUN_ID"
          
      - name: Build Docker Model
        run: mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
