name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Run MLflow Project
        run: |
          # Cari lokasi folder project secara otomatis
          # Kita mencari folder yang mengandung file MLproject
          FOLDER_PATH=$(find . -type f -name "MLproject" -exec dirname {} \; | head -n 1)
          
          if [ -z "$FOLDER_PATH" ]; then
            echo "Error: File 'MLproject' tidak ditemukan!"
            exit 1
          fi
          
          echo "Menjalankan proyek di: $FOLDER_PATH"
          mlflow run "$FOLDER_PATH" --env-manager=local
      
      - name: Get latest MLflow run_id
        run: |
          # Mengambil direktori run terakhir (berdasarkan waktu modifikasi)
          # Asumsi: mlruns/0/ adalah default path untuk eksperimen 0
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          
      - name: Build Docker Model
        run: mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
