name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy

      # LANGKAH CRITICAL: Menjalankan folder, bukan file.
      # Pastikan folder 'MLproject' ada di root repository Anda.
      
      # Perbaikan: Menggunakan nama eksperimen yang benar dan menyimpan log
      - name: Run MLflow Project
        run: |
          echo "Menjalankan proyek untuk eksperimen: Eksperimen_Hate_Speech_Ammar_Fernanda_Khoiri"
          mlflow run . --env-manager=local --experiment-name "Eksperimen_Hate_Speech_Ammar_Fernanda_Khoiri" > output.log 2>&1
          cat output.log
        
      # Perbaikan: Ekstraksi ID yang lebih akurat
      - name: Extract Run ID
        run: |
          # Mencari ID run secara eksplisit dari log MLflow
          RUN_ID=$(grep -oP '(?<=Run with ID \')[a-f0-9]+' output.log | tail -n 1)
          
          if [ -z "$RUN_ID" ]; then
            echo "Error: Run ID tidak ditemukan di log!"
            exit 1
          fi
          
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID berhasil ditemukan dan disimpan: $RUN_ID"

      - name: Build Docker Model
        run: |
          # Menggunakan variabel env yang sudah pasti terisi
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
