name: CI/CD MLflow

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Menambahkan tensorboard untuk mencegah TBNotInstalledError
          pip install mlflow tensorflow scikit-learn tensorboard pandas numpy
          
      - name: Run MLflow Project
        id: training
        run: |
          # Menjalankan project dan menyimpan output ke log
          mlflow run. --env-manager=local 
          
          # Mengekstrak RUN_ID dari log
          RUN_ID=$(grep -oP 'MLFLOW_RUN_ID:\K[a-zA-Z0-9]+' output.log | tail -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID berhasil ditemukan: $RUN_ID"
        
      - name: Build Docker Model
        run: |
          if [ -z "${{ env.RUN_ID }}" ]; then
            echo "Error: RUN_ID tidak ditemukan!"
            exit 1
          fi
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
