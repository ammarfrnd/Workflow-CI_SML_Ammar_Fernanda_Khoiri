name: CI/CD MLflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      
      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install -r requirements.txt

      # LANGKAH CRITICAL: Menjalankan folder, bukan file.
      # Pastikan folder 'MLproject' ada di root repository Anda.
      - name: Run MLflow Project
        run: |
          echo "Menjalankan proyek dari folder MLProject..."
          mlflow run MLproject --env-manager=local
        
      - name: Get latest MLflow run_id
        run: |
          # Mengambil folder run terbaru dari mlruns/0/
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | xargs basename)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          
      - name: Build Docker Model
        run: mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "cc"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/smsml_ammar_fernanda_khoiri:latest
